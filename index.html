<!DOCTYPE html>
<html>
<head>
    <title>Chess Board</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <link rel="icon" type="image/x-icon" href="horse.ico">
    <style>
        button {
            margin-top: 10px;
            background-color: #4CAF50;
            border: none;
            color: white;
            padding: 10px 20px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            cursor: pointer;
        }
        .move-circle {
            width: 30%;
            height: 30%;
            border-radius: 50%;
            background-color: rgba(20, 85, 30, 0.5); /* green translucent circle */
            position: absolute;
            top: 35%;
            left: 35%;
            pointer-events: none;
        }
        #moveTable {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            font-family: Arial, sans-serif;
            text-align: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        
        #moveTable thead th {
            background-color: #4CAF50;
            color: white;
            padding: 10px;
            font-weight: bold;
            border-bottom: 2px solid #388E3C;
        }
        
        #moveTable tbody tr {
            transition: background-color 0.3s;
        }
        
        #moveTable tbody tr:nth-child(even) {
            background-color: #f2f2f2;
        }
        
        #moveTable tbody tr:hover {
            background-color: #d1ffd1;
        }
        
        #moveTable td {
            padding: 8px;
            border: 1px solid #ddd;
        }
        h3 {
            font-family:"Helvetica", sans-serif;
        }
        #eval-container {
            width: 20px;
            height: 400px;
            border: 2px solid black;
            position: relative;
            margin-left: 10px;
            display: inline-block;
            vertical-align: top;
            background: black;
        }

        #eval-bar {
            width: 100%;
            height: 50%;
            background: white;
            position: absolute;
            bottom: 0;
            transition: height 0.3s ease;
        }
    </style>
</head>
<body>
    <div id="board-wrapper" style="display:flex;">
        <div id="board" style="width:400px;"></div>
        <div id="eval-container">
            <div id="eval-bar"></div>
        </div>
    </div>
    <div id="eval">0.00</div>
    <button onclick="resetBoard()">Reset Board</button>
    <h3>Move List</h3>
    <table id="moveTable" border="1" cellpadding="5" style="border-collapse:collapse; margin-top:10px;">
        <thead>
            <tr>
                <th>#</th>
                <th>White</th>
                <th>Black</th>
            </tr>
        </thead>
        <tbody id="moveBody">
        </tbody>
    </table>
    <button id="pgn-export">Copy PGN to clipboard</button>
    <script>
        let history = [];
        let moves = [];
        let currentIndex = 0;
        let currentFen = "start";
        
        const pgnExport = document.getElementById('pgn-export');
        
        const engine = new Worker('stockfish.js');
        engine.postMessage("uci");
        engine.postMessage("isready");
        
        let currentEval = null;
        let currentMate = null;
        
        var board = Chessboard('board', {
            orientation: 'white',
            position: 'start',
            draggable: true,
            pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png',
            onDrop: onDrop
        });
        
        function updateEvalBar(evalValue) {
            let clamped = Math.max(-5, Math.min(5, evalValue));
            let percent = ((clamped + 5) / 10) * 100;
            document.getElementById("eval-bar").style.height = percent + "%";
        }
        
        function isWhiteToMove(fen) {
            return fen.split(" ")[1] === "w";
        }
        
        function evaluatePosition(fen) {
            currentFen = fen;
        
            engine.postMessage("stop"); // stop previous calc
            engine.postMessage("position fen " + fen);
            engine.postMessage("go depth 15");
        }
        
        engine.onmessage = function (event) {
            const line = event.data;
        
            if (line.includes("score cp")) {
                const match = line.match(/score cp (-?\d+)/);
                if (match) {
                    currentEval = parseInt(match[1]) / 100;
                    currentMate = null;
                }
            }
        
            if (line.includes("score mate")) {
                const match = line.match(/score mate (-?\d+)/);
                if (match) {
                    currentMate = parseInt(match[1]);
                    currentEval = null;
                }
            }
        
            // only update when finished
            if (line.startsWith("bestmove")) {
                if (currentMate !== null) {
                    let mateText = currentMate > 0 ? `M${currentMate}` : `-M${Math.abs(currentMate)}`;
                    document.getElementById("eval").innerText = mateText;
        
                    updateEvalBar(currentMate > 0 ? 5 : -5);
                } 
                else if (currentEval !== null) {
                    let evalToShow = currentEval;
        
                    if (!isWhiteToMove(currentFen)) {
                        evalToShow = -evalToShow;
                    }
        
                    document.getElementById("eval").innerText = evalToShow.toFixed(2);
                    updateEvalBar(evalToShow);
                }
            }
        };
        
        function updateMoveTable() {
            const tbody = document.getElementById('moveBody');
            tbody.innerHTML = '';
        
            for (let i = 0; i < moves.length; i += 2) {
                const row = document.createElement('tr');
        
                const numCell = document.createElement('td');
                const whiteCell = document.createElement('td');
                const blackCell = document.createElement('td');
        
                numCell.textContent = (i / 2) + 1;
                whiteCell.textContent = moves[i]?.move || '';
                blackCell.textContent = moves[i + 1]?.move || '';
        
                whiteCell.onclick = () => loadPosition(i);
                blackCell.onclick = () => loadPosition(i + 1);
        
                whiteCell.style.cursor = 'pointer';
                blackCell.style.cursor = 'pointer';
                whiteCell.style.color = 'blue';
                blackCell.style.color = 'blue';
        
                row.appendChild(numCell);
                row.appendChild(whiteCell);
                row.appendChild(blackCell);
        
                tbody.appendChild(row);
            }
        }
        
        function loadPosition(index) {
            if (index >= 0 && index < moves.length) {
                currentFen = moves[index].fen;
                board.position(fenToPosition(currentFen));
                currentIndex = index;
            }
        }
        
        async function syncBoard() {
            try {
                const response = await fetch('https://chess-backend-psk7.onrender.com/board');
                const data = await response.json();
        
                currentFen = data.board;
                board.position(fenToPosition(currentFen));
        
                history = [data.board];
                currentIndex = 0;
        
                evaluatePosition(currentFen);
            } catch (error) {
                console.error('Failed to sync board:', error);
            }
        }
        syncBoard();
        
        async function onDrop(source, target, piece) {
            clearMoveCircles();
        
            const oldPosition = board.position();
            let move = source + target;
        
            const rank = target[1];
            if ((piece === 'wP' && rank === '8') || (piece === 'bP' && rank === '1')) {
                let promo = prompt("Promote to (q, r, b, n):", "q");
                promo = promo ? promo.toLowerCase() : "q";
                if (!["q","r","b","n"].includes(promo)) promo = "q";
                move += promo;
            }
        
            try {
                const response = await fetch('https://chess-backend-psk7.onrender.com/validate_move', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ move })
                });
        
                const data = await response.json();
        
                if (!response.ok || data.error) {
                    board.position(oldPosition, false);
                    return;
                }
        
                currentFen = data.new_board;
                board.position(fenToPosition(currentFen));
        
                const san = data.san || move;
                moves.push({ move: san, fen: data.new_board });
        
                updateMoveTable();
        
                history.push(data.new_board);
                currentIndex = history.length - 1;
        
                evaluatePosition(currentFen);
        
            } catch (error) {
                console.error('Network error:', error);
                board.position(oldPosition, false);
            }
        }
        
        pgnExport.addEventListener("click", function() {
            let pgnMoves = "";
        
            for (let i = 0; i < moves.length; i++) {
                if (i % 2 === 0) {
                    pgnMoves += (Math.floor(i / 2) + 1) + ". ";
                }
                pgnMoves += moves[i].move + " ";
            }
        
            const today = new Date().toISOString().split('T')[0].replace(/-/g, '.');
        
            let pgn =
        `[Event "Online board simulator"]
        [Site "https://mysteryman789.github.io/chessboard/"]
        [Date "${today}"]
        [White "White"]
        [Black "Black"]
        [Result "*"]
        
        ${pgnMoves}*`;
        
            navigator.clipboard.writeText(pgn);
            pgnExport.textContent = "Copied PGN to clipboard!";
        });
        
        function fenToPosition(fen) {
            const position = {};
            const rows = fen.split(' ')[0].split('/');
        
            const pieceMap = {
                'p': 'bP','r': 'bR','n': 'bN','b': 'bB','q': 'bQ','k': 'bK',
                'P': 'wP','R': 'wR','N': 'wN','B': 'wB','Q': 'wQ','K': 'wK'
            };
        
            rows.forEach((row, i) => {
                let col = 0;
                for (const c of row) {
                    if (!isNaN(c)) {
                        col += parseInt(c);
                    } else {
                        const square = 'abcdefgh'[col] + (8 - i);
                        position[square] = pieceMap[c];
                        col++;
                    }
                }
            });
        
            return position;
        }
        
        async function resetBoard() {
            try {
                const response = await fetch('https://chess-backend-psk7.onrender.com/reset', { method: 'POST' });
                const data = await response.json();
        
                currentFen = data.new_board;
                board.position(fenToPosition(currentFen));
        
                history = [data.new_board];
                currentIndex = 0;
                moves = [];
        
                updateMoveTable();
                evaluatePosition(currentFen);
        
            } catch (error) {
                console.error('Failed to reset board:', error);
            }
        }
        
        let circles = [];
        
        function clearMoveCircles() {
            circles.forEach(el => el.remove());
            circles = [];
        }
        
        $('#board').on('mousedown', '.piece-417db', async function () {
            clearMoveCircles();
        
            const square = $(this).parent().attr('data-square');
        
            try {
                const res = await fetch('https://chess-backend-psk7.onrender.com/legal_moves', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ square })
                });
        
                const data = await res.json();
        
                if (data.moves) {
                    data.moves.forEach(dest => {
                        const squareEl = $(`.square-${dest}`);
                        if (squareEl.length) {
                            const circle = $('<div class="move-circle"></div>');
                            squareEl.css('position', 'relative').append(circle);
                            circles.push(circle[0]);
                        }
                    });
                }
            } catch (err) {
                console.error('Error fetching legal moves:', err);
            }
        });
        
        $('#board').on('mouseup', clearMoveCircles);
        
        document.addEventListener('keydown', function (event) {
            if (event.key === 'ArrowLeft' && currentIndex > 0) {
                currentIndex--;
                currentFen = history[currentIndex];
                board.position(fenToPosition(currentFen));
                evaluatePosition(currentFen);
            }
        
            if (event.key === 'ArrowRight' && currentIndex < history.length - 1) {
                currentIndex++;
                currentFen = history[currentIndex];
                board.position(fenToPosition(currentFen));
                evaluatePosition(currentFen);
            }
        });
        </script>
</body>
</html>
